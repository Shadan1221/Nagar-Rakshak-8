version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nagar-rakshak-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:3000
    depends_on:
      - backend
    networks:
      - nagar-network
    command: npm run dev

  backend:
    build:
      context: ./supabase/functions/analyze-complaint-image
      dockerfile: Dockerfile
    container_name: nagar-rakshak-backend
    ports:
      - "3000:3000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PORT=3000
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - nagar-network

networks:
  nagar-network:
    driver: bridge
